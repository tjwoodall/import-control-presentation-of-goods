openapi: 3.0.3
info:
  title: ICS2 Presentation Of Goods
  description: ""
  contact: {}
  version: "2.0"
servers:
- url: https://test-api.service.hmrc.gov.uk/customs/import-control/presentation-of-goods
  description: Sandbox
- url: https://api.service.hmrc.gov.uk/customs/import-control/presentation-of-goods
  description: Production
tags:
- name: import-control-presentation-of-goods-api
  description: ""
paths:
  /:
    post:
      tags:
      - import-control-presentation-of-goods-api
      summary: Submit a Presentation of Goods
      description: |
        This API allows the user to submit a Presentation Notification.
      operationId: SubmitaPresentationofGoods
      parameters:
      - name: Accept
        in: header
        description: "Specifies the version of the API that you want to call. See\
          \ [versioning](/api-documentation/docs/reference-guide#versioning)."
        required: true
        style: simple
        explode: false
        schema:
          type: string
          example: application/vnd.hmrc.2.0+json
      - name: Content-Type
        in: header
        description: Specifies the format of the request body. Must be "application/json".
        required: false
        style: simple
        explode: false
        schema:
          type: string
          example: application/json
      requestBody:
        description: ""
        content:
          application/json:
            schema:
              required:
              - customsOfficeOfPresentation
              - dateAndTimeOfPresentation
              - declarant
              - declarationDate
              - locationOfGoods
              - lrn
              - personPresentingTheGoods
              - previousDocument
              type: object
              properties:
                lrn:
                  maxLength: 22
                  minLength: 1
                  type: string
                declarationDate:
                  type: string
                  format: date-time
                dateAndTimeOfPresentation:
                  type: string
                  format: date-time
                previousDocument:
                  maxItems: 9999
                  minItems: 1
                  type: array
                  description: ""
                  items:
                    title: PreviousDocument
                    required:
                    - consignmentMasterLevel
                    - goodsItemIdentifier
                    - previousMRN
                    - type
                    type: object
                    properties:
                      previousMRN:
                        maxLength: 18
                        minLength: 18
                        type: string
                      type:
                        maxLength: 4
                        minLength: 4
                        type: string
                      goodsItemIdentifier:
                        maximum: 99999
                        minimum: 0
                        type: integer
                      consignmentMasterLevel:
                        title: ConsignmentMasterLevel
                        required:
                        - consignmentHouseLevel
                        - transportDocumentMasterLevel
                        type: object
                        properties:
                          receptacle:
                            maxItems: 9999
                            minItems: 0
                            type: array
                            description: ""
                            items:
                              title: Receptacle
                              required:
                              - receptacleIdentificationNumber
                              type: object
                              properties:
                                receptacleIdentificationNumber:
                                  maxLength: 35
                                  minLength: 1
                                  type: string
                          carrier:
                            title: Carrier
                            required:
                            - identificationNumber
                            type: object
                            properties:
                              identificationNumber:
                                maxLength: 17
                                minLength: 1
                                type: string
                                description: The carrier identification number.
                            description: |
                              The carrier of the goods.
                              This object **must** be present if one or more house-level transport documents of type N703 or N740 are included in the presentation notification.
                              Otherwise, this object is optional.
                          consignmentHouseLevel:
                            maxItems: 99
                            minItems: 1
                            type: array
                            description: ""
                            items:
                              title: ConsignmentHouseLevelType
                              required:
                              - transportDocumentHouseLevel
                              type: object
                              properties:
                                transportDocumentHouseLevel:
                                  title: TransportDocumentReferenceType
                                  required:
                                  - referenceNumber
                                  - type
                                  type: object
                                  properties:
                                    referenceNumber:
                                      maxLength: 70
                                      minLength: 1
                                      type: string
                                    type:
                                      maxLength: 4
                                      minLength: 1
                                      type: string
                          transportDocumentMasterLevel:
                            title: TransportDocumentReferenceType
                            required:
                            - referenceNumber
                            - type
                            type: object
                            properties:
                              referenceNumber:
                                maxLength: 70
                                minLength: 1
                                type: string
                              type:
                                maxLength: 4
                                minLength: 1
                                type: string
                          transportEquipment:
                            maxItems: 9999
                            minItems: 0
                            type: array
                            description: ""
                            items:
                              title: TransportEquipmentType
                              required:
                              - containerIdentificationNumber
                              type: object
                              properties:
                                containerIdentificationNumber:
                                  maxLength: 17
                                  minLength: 1
                                  type: string
                declarant:
                  title: DeclarantType
                  required:
                  - address
                  - communication
                  - identificationNumber
                  - name
                  type: object
                  properties:
                    name:
                      maxLength: 70
                      minLength: 1
                      type: string
                    identificationNumber:
                      maxLength: 17
                      minLength: 1
                      type: string
                    address:
                      title: DeclarantAddressType
                      required:
                      - city
                      - country
                      type: object
                      properties:
                        city:
                          maxLength: 35
                          minLength: 1
                          type: string
                        country:
                          maxLength: 2
                          minLength: 2
                          pattern: "[a-zA-Z]{2}"
                          type: string
                          description: Country Code from list
                          example: DE
                        subDivision:
                          maxLength: 35
                          minLength: 1
                          type: string
                        street:
                          maxLength: 70
                          minLength: 1
                          type: string
                        postCode:
                          maxLength: 9
                          minLength: 1
                          type: string
                        streetAdditionalLine:
                          maxLength: 70
                          minLength: 1
                          type: string
                        number:
                          maxLength: 35
                          minLength: 1
                          type: string
                        poBox:
                          maxLength: 70
                          minLength: 1
                          type: string
                    communication:
                      maxItems: 9
                      minItems: 1
                      type: array
                      description: ""
                      items:
                        title: CommunicationType
                        required:
                        - identifier
                        - type
                        type: object
                        properties:
                          identifier:
                            maxLength: 512
                            minLength: 1
                            type: string
                          type:
                            maxLength: 3
                            minLength: 1
                            type: string
                representative:
                  title: RepresentativeType
                  required:
                  - communication
                  - identificationNumber
                  - name
                  - status
                  type: object
                  properties:
                    name:
                      maxLength: 70
                      minLength: 1
                      type: string
                    identificationNumber:
                      maxLength: 17
                      minLength: 1
                      type: string
                    status:
                      maximum: 9
                      minimum: 0
                      type: integer
                      format: int32
                    communication:
                      maxItems: 9
                      type: array
                      description: ""
                      items:
                        title: CommunicationType
                        required:
                        - identifier
                        - type
                        type: object
                        properties:
                          identifier:
                            maxLength: 512
                            minLength: 1
                            type: string
                          type:
                            maxLength: 3
                            minLength: 1
                            type: string
                locationOfGoods:
                  title: LocationOfGoodsType
                  required:
                  - qualifierOfIdentification
                  - typeOfLocation
                  type: object
                  properties:
                    typeOfLocation:
                      maxLength: 1
                      minLength: 1
                      type: string
                    qualifierOfIdentification:
                      maxLength: 1
                      minLength: 1
                      type: string
                    unloCode:
                      maxLength: 17
                      minLength: 1
                      type: string
                    customsOffice:
                      title: CustomsOfficeType
                      required:
                      - referenceNumber
                      type: object
                      properties:
                        referenceNumber:
                          maxLength: 8
                          minLength: 1
                          type: string
                    gnss:
                      title: GnssType
                      required:
                      - latitude
                      - longitude
                      type: object
                      properties:
                        latitude:
                          maxLength: 17
                          minLength: 1
                          type: string
                        longitude:
                          maxLength: 17
                          minLength: 1
                          type: string
                    economicOperator:
                      title: EconomicOperatorType
                      required:
                      - identificationNumber
                      type: object
                      properties:
                        identificationNumber:
                          maxLength: 17
                          minLength: 1
                          type: string
                        authorisationNumber:
                          maxLength: 35
                          minLength: 1
                          type: string
                        additionalIdentifier:
                          maxLength: 4
                          minLength: 1
                          type: string
                    address:
                      title: LocationOfGoodsAddressType
                      required:
                      - city
                      - country
                      - postCode
                      - streetAndNumber
                      type: object
                      properties:
                        streetAndNumber:
                          maxLength: 70
                          minLength: 1
                          type: string
                        postCode:
                          maxLength: 9
                          minLength: 1
                          type: string
                        city:
                          maxLength: 35
                          minLength: 1
                          type: string
                        country:
                          maxLength: 2
                          minLength: 2
                          pattern: "[a-zA-Z]{2}"
                          type: string
                          description: Country Code from list
                          example: DE
                    postcodeAddress:
                      title: PostcodeAddress
                      required:
                      - country
                      - number
                      - postCode
                      type: object
                      properties:
                        postCode:
                          maxLength: 9
                          minLength: 1
                          type: string
                        number:
                          maxLength: 35
                          minLength: 1
                          type: string
                        country:
                          maxLength: 2
                          minLength: 2
                          pattern: "[a-zA-Z]{2}"
                          type: string
                          description: Country Code from list
                          example: DE
                personPresentingTheGoods:
                  title: PersonPresentingTheGoodsType
                  required:
                  - identificationNumber
                  type: object
                  properties:
                    identificationNumber:
                      maxLength: 17
                      minLength: 1
                      type: string
                customsOfficeOfPresentation:
                  title: CustomsOfficeOfPresentationType
                  required:
                  - referenceNumber
                  type: object
                  properties:
                    referenceNumber:
                      maxLength: 8
                      minLength: 8
                      type: string
              description: Presentation of Goods Notification from Carriers
            examples:
              Generic example:
                description: Generic example
                value:
                  $ref: ./examples/presentation-notification-request.json
              Air freight N740 example:
                description: Air freight N740 example
                value:
                  $ref: ./examples/pog-notification-air-freight-N740.json
              Air freight example:
                description: Air freight example
                value:
                  $ref: ./examples/pog-notification-air-freight.json
              Maritime bulk example:
                description: Maritime bulk example
                value:
                  $ref: ./examples/pog-notification-maritime-bulk.json
              Maritime container example:
                description: Maritime container example
                value:
                  $ref: ./examples/pog-notification-maritime-container.json
              Post road example:
                description: Post road example
                value:
                  $ref: ./examples/pog-notification-post-road.json
              Accompanied RoRo example:
                description: Accompanied RoRo example
                value:
                  $ref: ./examples/pog-notification-roro-accompanied.json
              Unaccompanied RoRo example:
                description: Unaccompanied RoRo example
                value:
                  $ref: ./examples/pog-notification-roro-unaccompanied.json
        required: true
      responses:
        "202":
          description: ""
          content:
            application/json:
              schema:
                required:
                - boxId
                type: object
                properties:
                  boxId:
                    type: string
                    description: The Push Pull Notifications Service (PPNS) box ID.
              example:
                boxId: 50dca3fc-c37c-4f03-b719-63571333624c
        "400":
          description: ""
          content:
            application/json:
              schema:
                required:
                - code
                type: object
                properties:
                  code:
                    type: string
              examples:
                invalidJson:
                  description: The JSON payload does not conform with the JSON schema
                  value:
                    code: SCHEMA_ERROR
                    message: The JSON request was not conformant with the schema.
                      Schematic errors are detailed in the errors property below.
                    errors:
                    - code: DATETIME
                      message: "declarationDate: 2023-05-17 is an invalid date-time"
                      path: /declarationDate
                    - code: MAXLENGTH
                      message: "previousDocument[0].previousMRN: may only be 18 characters\
                        \ long"
                      path: "/previousDocument[0]/previousMRN"
      deprecated: false
      security:
      - userRestricted:
        - write:import-control-system-2
